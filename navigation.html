<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>India Planner Navigation</title>
  <style>
    :root {
      color: #5c4038;
      background: transparent;
      font-family: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 8px;
      background: linear-gradient(145deg, #fffdf9, #fbf2ee);
    }

    .navigation-card {
      width: min(1120px, 100%);
      padding: 10px;
      overflow: hidden;
      border: 1px solid rgba(181, 119, 108, .22);
      border-radius: 18px;
      background: rgba(255, 252, 248, .96);
      box-shadow: 0 10px 28px rgba(111, 67, 59, .09);
    }

    .navigation-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(118px, 1fr));
      gap: 7px;
    }

    .nav-button {
      display: flex;
      min-width: 0;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 10px;
      border: 1px solid rgba(185, 123, 113, .2);
      border-radius: 12px;
      color: #5c4038;
      background: linear-gradient(145deg, #fffdfb, var(--tint));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 4px 12px rgba(111,67,59,.05);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .86rem;
      font-weight: 650;
      line-height: 1.15;
      text-align: center;
      text-decoration: none;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .nav-button:hover,
    .nav-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(165, 91, 87, .5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.95), 0 7px 16px rgba(111,67,59,.1);
      outline: none;
    }

    .nav-button:active { transform: translateY(0); }

    .icon {
      flex: 0 0 auto;
      font-size: 1.05rem;
      line-height: 1;
    }

    .beauty { --tint: #fbe3e8; }
    .career { --tint: #e8f1f8; }
    .finance { --tint: #fff1d6; }
    .wellness { --tint: #e5f2e8; }
    .birthday { --tint: #fae1e6; }
    .vision { --tint: #eee4f8; }
    .vault { --tint: #eeeae7; }

    @media (max-width: 900px) {
      .navigation-grid { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
    }

    @media (max-width: 560px) {
      body { padding: 6px; }
      .navigation-card { padding: 8px; border-radius: 15px; }
      .navigation-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
      .nav-button { min-height: 45px; padding: 8px; font-size: .81rem; }
      .nav-button:last-child { grid-column: 1 / -1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .nav-button { transition: none; }
    }
  </style>
</head>
<body>
  <nav class="navigation-card" aria-label="India Planner quick navigation">
    <div class="navigation-grid">
      <a class="nav-button beauty" href="https://app.notion.com/p/39f64fe5202781d88f9dce9c3bb4e6db" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">💄</span><span>Beauty</span></a>
      <a class="nav-button career" href="https://app.notion.com/p/39f64fe52027813ca8018efb7185dc5a" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">💼</span><span>Career</span></a>
      <a class="nav-button finance" href="https://app.notion.com/p/39f64fe5202781edaa6ccfbcd65d1669" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">💰</span><span>Finance</span></a>
      <a class="nav-button wellness" href="https://app.notion.com/p/39f64fe5202781d46b20ce63d2f115b9" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">💗</span><span>Wellness</span></a>
      <a class="nav-button birthday" href="https://app.notion.com/p/39f64fe520278173b1e16e8456602dde" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">🎂</span><span>Birthday</span></a>
      <a class="nav-button vision" href="https://app.notion.com/p/39f64fe520278158be64cffdbcdcc31d" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">🎯</span><span>Vision Board</span></a>
      <a class="nav-button vault" href="https://app.notion.com/p/39f64fe520278138a806fc9539c72956" target="_blank" rel="noopener noreferrer"><span class="icon" aria-hidden="true">🔒</span><span>Password Vault</span></a>
    </div>
  </nav>
</body>
</html>
