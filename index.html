<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>India’s Daily Moment</title>
  <style>:root {
  color: #5f4438;
  background: #fbf7f2;
  font-family: Georgia, "Times New Roman", serif;
  font-synthesis: none;
}

* { box-sizing: border-box; }

html, body {
  min-height: 100%;
  margin: 0;
}

body {
  display: grid;
  place-items: center;
  padding: 12px;
  background:
    radial-gradient(circle at 8% 10%, rgba(238, 189, 198, .32), transparent 28%),
    linear-gradient(145deg, #fffdf9, #f8eee9);
}

.widget {
  position: relative;
  isolation: isolate;
  width: min(580px, 100%);
  min-height: 540px;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  overflow: hidden;
  border: 1px solid rgba(169, 112, 102, .22);
  border-radius: 24px;
  background: rgba(255, 252, 248, .96);
  box-shadow: 0 18px 48px rgba(112, 70, 60, .12);
}

.identity-panel,
.moment-panel {
  position: relative;
  z-index: 1;
  padding: 22px 26px;
}

.identity-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 160px;
  grid-template-areas:
    "title image"
    "ornament image"
    "greeting image"
    "quote quote";
  column-gap: 20px;
  align-items: center;
  background: linear-gradient(155deg, #f6d9df, #f9e9e5 72%, #fff7ee);
  border-bottom: 1px solid rgba(169, 112, 102, .12);
}

.label {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: .13em;
  text-transform: uppercase;
}

h1 {
  grid-area: title;
  max-width: 15ch;
  margin: 0 0 7px;
  color: #684039;
  font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", cursive;
  font-size: clamp(1.68rem, 5.2vw, 2.35rem);
  line-height: 1.12;
  font-weight: 500;
  letter-spacing: .018em;
  text-wrap: balance;
  text-shadow: 0 1px 0 rgba(255,255,255,.9), 0 8px 22px rgba(120,70,63,.1);
}

.ornament {
  grid-area: ornament;
  width: max-content;
  color: #a96160;
  font-size: 1rem;
}

.greeting {
  grid-area: greeting;
  margin: 7px 0 0;
  color: #6f4a43;
  font-size: 1.08rem;
  font-style: italic;
}

.moment-image {
  grid-area: image;
  position: relative;
  width: 160px;
  height: 102px;
  margin: 0;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, .72);
  border-radius: 18px;
  box-shadow: 0 10px 26px rgba(112, 70, 60, .12);
}

.moment-image::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  box-shadow: inset 0 0 0 1px rgba(164, 104, 95, .08);
  pointer-events: none;
}

.moment-image img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 56%;
}

.moment-panel {
  display: flex;
  flex-direction: column;
  justify-content: start;
  background: rgba(255, 252, 248, .84);
}

.calendar-card {
  margin-top: 14px;
  padding: 13px 16px 12px;
  border: 1px solid rgba(183, 122, 110, .18);
  border-radius: 17px;
  background: linear-gradient(145deg, rgba(255,255,255,.8), rgba(250,232,231,.7));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 8px 24px rgba(112,70,60,.06);
}

.calendar-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.calendar-heading h2 {
  margin: 0;
  color: #674039;
  font-family: "Snell Roundhand", "Apple Chancery", "URW Chancery L", cursive;
  font-size: 1.25rem;
  font-weight: 600;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 4px;
}

.calendar-weekdays {
  margin-bottom: 5px;
  color: #a4796e;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: .62rem;
  font-weight: 700;
  text-align: center;
}

.calendar-day {
  display: grid;
  min-height: 24px;
  place-items: center;
  border-radius: 9px;
  color: #644740;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: .72rem;
  font-variant-numeric: tabular-nums;
}

.calendar-day.is-today {
  color: #fff;
  background: linear-gradient(145deg, #bb7775, #d5929b);
  box-shadow: 0 4px 12px rgba(170, 93, 95, .24);
  font-weight: 800;
}

.calendar-day.is-empty { visibility: hidden; }

.time-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 12px;
  border: 1px solid rgba(183, 122, 110, .15);
  border-radius: 16px;
  background: rgba(255,255,255,.52);
}

.label {
  color: #90675e;
  font-size: .62rem;
  font-weight: 700;
}

#time {
  display: block;
  margin-top: 4px;
  color: #5e3933;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: clamp(1.3rem, 4vw, 1.62rem);
  line-height: 1;
  font-weight: 750;
  font-variant-numeric: tabular-nums;
}

.date-wrap { text-align: left; }

.time-wrap {
  min-width: 145px;
  padding: 8px 11px;
  border: 1px solid rgba(183,122,110,.18);
  border-radius: 12px;
  text-align: right;
  background: linear-gradient(145deg, rgba(248,222,224,.74), rgba(255,249,244,.9));
}

#date {
  display: block;
  max-width: 15ch;
  margin-top: 7px;
  color: #654840;
  font-size: .96rem;
  line-height: 1.35;
}

blockquote {
  grid-area: quote;
  position: relative;
  margin: 14px 0 0;
  padding: 14px 17px 14px 23px;
  border-left: 3px solid #c98688;
  border-radius: 4px 18px 18px 4px;
  color: #583a35;
  background: linear-gradient(110deg, rgba(255,255,255,.52), rgba(255,249,244,.7));
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: clamp(1.14rem, 3.1vw, 1.36rem);
  line-height: 1.36;
  font-style: italic;
  letter-spacing: .005em;
  box-shadow: 0 8px 24px rgba(112,70,60,.06);
}

blockquote::before {
  content: "“";
  position: absolute;
  left: 8px;
  top: 4px;
  color: #bd7e77;
  font-size: 1.7rem;
  line-height: 1;
}

blockquote::after { content: "”"; color: #bd7e77; }

.soft-orb {
  position: absolute;
  z-index: 0;
  border-radius: 50%;
  pointer-events: none;
}

.soft-orb-one {
  width: 170px;
  height: 170px;
  right: -70px;
  top: -90px;
  background: rgba(239, 199, 204, .28);
}

.soft-orb-two {
  width: 120px;
  height: 120px;
  left: 31%;
  bottom: -78px;
  background: rgba(212, 175, 115, .12);
}

@media (max-width: 720px) {
  body { padding: 10px; }

  .widget {
    grid-template-columns: 1fr;
    min-height: 0;
    border-radius: 22px;
  }

  .identity-panel,
  .moment-panel { padding: 20px 22px; }
}

@media (max-width: 420px) {
  body { padding: 7px; }

  .widget { border-radius: 20px; }

  .identity-panel,
  .moment-panel { padding: 18px 17px; }

  .identity-panel {
    grid-template-columns: minmax(0, 1fr) 112px;
    column-gap: 13px;
  }

  h1 { font-size: 1.54rem; }

  .time-row {
    align-items: center;
    flex-direction: row;
    gap: 12px;
    padding: 11px;
  }

  .date-wrap { text-align: left; }
  .time-wrap { min-width: 125px; padding: 7px 9px; }
  #date { max-width: none; }
  #time { font-size: 1.22rem; }
  .moment-image { width: 112px; height: 82px; }
  blockquote { padding: 13px 15px 13px 22px; font-size: 1.11rem; }
  .calendar-card { padding: 12px 11px 11px; }
  .calendar-grid { gap: 3px; }
  .calendar-day { min-height: 25px; font-size: .68rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; }
}
</style>

        <div class="time-wrap">
          <p class="label">Local time</p>
          <time id="time">8:18 PM</time>
        </div>
      </div>

      <section class="calendar-card" aria-labelledby="calendar-month">
        <div class="calendar-heading">
          <h2 id="calendar-month">July 2026</h2>
        </div>
        <div class="calendar-grid calendar-weekdays" aria-hidden="true">
          <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div class="calendar-grid" id="calendar-days" aria-label="Current month calendar"></div>
      </section>

    </section>
  </main>

  <script>const affirmations = [
  "I can move through today with peace and purpose.",
  "Small steps still move my life forward.",
  "I deserve routines that support me.",
  "I can begin again without judging myself.",
  "Progress does not have to be perfect.",
  "I am creating a life that feels safe, organized, and beautiful.",
  "Today, I will focus on what matters most."
];

const timeElement = document.querySelector("#time");
const dateElement = document.querySelector("#date");
const greetingElement = document.querySelector("#greeting");
const affirmationElement = document.querySelector("#affirmation");
const calendarMonthElement = document.querySelector("#calendar-month");
const calendarDaysElement = document.querySelector("#calendar-days");

function greetingForHour(hour) {
  if (hour < 12) return "Good morning";
  if (hour < 17) return "Good afternoon";
  return "Good evening";
}

function dayIndex(date) {
  const localMidnight = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  return Math.floor(localMidnight.getTime() / 86_400_000) % affirmations.length;
}

function renderCalendar(date) {
  const year = date.getFullYear();
  const month = date.getMonth();
  const firstWeekday = new Date(year, month, 1).getDay();
  const numberOfDays = new Date(year, month + 1, 0).getDate();

  calendarMonthElement.textContent = new Intl.DateTimeFormat(undefined, {
    month: "long",
    year: "numeric"
  }).format(date);

  calendarDaysElement.replaceChildren();

  for (let index = 0; index < firstWeekday; index += 1) {
    const emptyDay = document.createElement("span");
    emptyDay.className = "calendar-day is-empty";
    emptyDay.setAttribute("aria-hidden", "true");
    calendarDaysElement.append(emptyDay);
  }

  for (let day = 1; day <= numberOfDays; day += 1) {
    const dayElement = document.createElement("span");
    const isToday = day === date.getDate();
    dayElement.className = `calendar-day${isToday ? " is-today" : ""}`;
    dayElement.textContent = day;
    if (isToday) dayElement.setAttribute("aria-current", "date");
    calendarDaysElement.append(dayElement);
  }
}

function updateMoment() {
  const now = new Date();

  timeElement.textContent = new Intl.DateTimeFormat(undefined, {
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  }).format(now);

  dateElement.textContent = new Intl.DateTimeFormat(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  }).format(now);

  greetingElement.textContent = greetingForHour(now.getHours());
  affirmationElement.textContent = affirmations[dayIndex(now)];
  renderCalendar(now);
}

updateMoment();
window.setInterval(updateMoment, 1_000);
</script>
